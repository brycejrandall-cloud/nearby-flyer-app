name: Patch auth email code flow

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update account creation wording for email codes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          replacements = [
              (
                  '<p>Accounts are required for posting so every listing has a real owner and contact info.</p>',
                  '<p>Accounts are required for posting. Nearby Flyer sends a 6-digit email code to confirm your account.</p>'
              ),
              (
                  '<div class="form-note">Name and email are required. This info is saved to your profile and can prefill future listings, claims, and contact cards.</div>',
                  '<div class="form-note">Name and email are required. After you create the account, check your email for a 6-digit confirmation code and enter it below.</div>'
              ),
              (
                  '<button class="btn primary" type="submit" id="createAccountSendCodeBtn">Create account</button>',
                  '<button class="btn primary" type="submit" id="createAccountSendCodeBtn">Send account code</button>'
              ),
              (
                  '<div class="form-note">Enter the 6-digit confirmation code from your email. Do not click the email link while testing locally.</div>',
                  '<div class="form-note">Enter the 6-digit confirmation code from your email. Use the newest code if you requested more than one.</div>'
              ),
              (
                  'setStatusText("signupStatus", "Creating account…");',
                  'setStatusText("signupStatus", "Sending account code…");'
              ),
              (
                  'setStatusText("signupStatus", "Account created. Check your email for the 6-digit confirmation code, then enter it below.");',
                  'setStatusText("signupStatus", "Account code sent. Check your email for the 6-digit confirmation code, then enter it below.");'
              ),
              (
                  'return setStatusText("signupStatus", "Password is missing. Re-enter it and send a fresh code.");',
                  'return setStatusText("signupStatus", "Password is missing. Re-enter it and send a fresh account code.");'
              ),
              (
                  'return setStatusText("signupStatus", error.message || "That code did not work. Use the newest email code.");',
                  'return setStatusText("signupStatus", error.message || "That code did not work. Use the newest account code from your email.");'
              ),
              (
                  'setStatusText("signupStatus", "Account confirmed and signed in.");',
                  'setStatusText("signupStatus", "Account confirmed and signed in.");'
              ),
              (
                  'setStatusText("authStatus", "Supabase could not send the confirmation email yet. Finish Resend/Supabase SMTP setup, then try again.");',
                  'setStatusText("authStatus", "The account code email could not be sent yet. Check Supabase SMTP/Resend settings, then try again.");'
              ),
          ]
          for old, new in replacements:
              if old not in text:
                  print(f'Missing expected text, skipping: {old[:80]}')
              else:
                  text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Remove one-time workflow and commit patch
        run: |
          rm -f .github/workflows/patch-auth-code-flow.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-auth-code-flow.yml
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Clarify signup email code flow"
          git push
