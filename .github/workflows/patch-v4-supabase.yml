name: Patch Supabase v4 config

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Point index.html at Supabase v4
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text()
          old_url = 'const SUPABASE_URL = "https://sohwejfsccmfsbectjif.supabase.co";'
          new_url = 'const SUPABASE_URL = "https://cvdwtqbicmriiidifdjz.supabase.co";'
          old_key = 'const SUPABASE_ANON_KEY = "sb_publishable_9n31Q6FBbpIB_nyJhBz_pw_OhT-sO-o";'
          new_key = 'const SUPABASE_ANON_KEY = "sb_publishable_YL7BogU-18QoCguINlurFw_iX_2SVxh";'
          if old_url not in text:
              print('Old Supabase URL not found; maybe already patched.')
          else:
              text = text.replace(old_url, new_url, 1)
          if old_key not in text:
              print('Old Supabase key not found; maybe already patched.')
          else:
              text = text.replace(old_key, new_key, 1)
          path.write_text(text)
          PY
      - name: Remove one-time workflow and commit patch
        run: |
          rm -f .github/workflows/patch-v4-supabase.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-v4-supabase.yml
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Point frontend to Supabase v4"
          git push
